<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myRadar</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:    #f2f2f7;
  --sur:   #ffffff;
  --sur2:  #f2f2f7;
  --brd:   #e5e5ea;
  --brd2:  #d1d1d6;
  --lbl:   #8e8e93;
  --txt:   #1c1c1e;
  --txt2:  #3a3a3c;
  --txt3:  #636366;
  --up:    #1d6f42;
  --dn:    #c0392b;
  --font:  -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --fnum:  'SF Mono', 'Menlo', 'Consolas', monospace;
  --bar-h: 48px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── BAR ── */
#bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: var(--bar-h);
  background: rgba(255,255,255,.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--brd);
  display: flex; align-items: center;
  padding: 0 16px; gap: 6px;
  overflow-x: auto;
}
#bar::-webkit-scrollbar { display: none; }

/* separator */
.bsep {
  width: 1px; height: 24px;
  background: var(--brd2);
  flex-shrink: 0; margin: 0 4px;
}

/* ── STAT-FILTER CHIPS ── */
.stat-l {
  font-size: 9px; font-weight: 600;
  color: var(--lbl);
  text-transform: uppercase;
  letter-spacing: .05em;
  line-height: 1;
}
.stat-v {
  font-size: 15px; font-weight: 700;
  color: var(--txt);
  font-variant-numeric: tabular-nums;
  line-height: 1.15;
}
.stat-v.up { color: var(--up); }
.stat-v.dn { color: var(--dn); }

.statbtn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px;
  flex-shrink: 0;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 3px 11px;
  height: 36px;
  min-width: 48px;
  cursor: pointer;
  transition: background .15s, border-color .15s, box-shadow .15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.statbtn:hover {
  background: rgba(0,0,0,.04);
}
.statbtn.active {
  background: var(--sur);
  border-color: var(--brd2);
  box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
}
.statbtn.active .stat-l { color: var(--txt3); }
.statbtn.active .stat-v { color: var(--txt); }
.statbtn.active .stat-v.up { color: var(--up); }
.statbtn.active .stat-v.dn { color: var(--dn); }

/* ── MARKET TOGGLE ── */
.mktbtn {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  width: 36px; height: 36px;
  cursor: pointer;
  color: var(--lbl);
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  user-select: none;
}
.mktbtn:hover { background: rgba(0,0,0,.04); }
.mktbtn.on {
  background: var(--sur);
  border-color: var(--brd2);
  box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  color: var(--up);
}

/* ── SEARCH ── */
.search-wrap { position: relative; flex-shrink: 0; }
.search-wrap svg {
  position: absolute; left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--lbl); pointer-events: none;
}
.search-input {
  width: 120px;
  background: rgba(118,118,128,.12);
  border: none;
  border-radius: 10px;
  color: var(--txt);
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 10px 6px 28px;
  outline: none;
  transition: width .2s, background .15s;
}
.search-input:focus {
  width: 180px;
  background: var(--sur);
  box-shadow: 0 0 0 3px rgba(0,122,255,.15);
}
.search-input::placeholder { color: var(--lbl); }

/* ── RELOAD ── */
.bar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#last-upd { font-size: 10px; color: var(--lbl); font-variant-numeric: tabular-nums; white-space: nowrap; }
#fx-bar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.fx-chip { display: flex; align-items: baseline; gap: 4px; flex-shrink: 0; }
.fx-lbl { font-size: 9px; font-weight: 600; color: var(--lbl); text-transform: uppercase; letter-spacing: .04em; }
.fx-val { font-family: var(--fnum); font-size: 12px; font-weight: 600; color: var(--txt2); font-variant-numeric: tabular-nums; }
.vix-high { color: var(--dn); }
.vix-mid  { color: #b8860b; }
.vix-low  { color: var(--up); }
.fx-sep { width: 1px; height: 14px; background: var(--brd2); flex-shrink: 0; }
.btn-reload {
  background: none; border: none; cursor: pointer;
  color: var(--lbl); display: flex; align-items: center;
  padding: 4px; border-radius: 8px;
  transition: background .12s, color .12s;
}
.btn-reload:hover { background: rgba(0,0,0,.06); color: var(--txt2); }
.btn-reload:disabled { opacity: .35; cursor: not-allowed; }
.spin {
  width: 14px; height: 14px;
  border: 1.8px solid var(--brd2);
  border-top-color: var(--lbl);
  border-radius: 50%;
  animation: ro .65s linear infinite;
}
@keyframes ro { to { transform: rotate(360deg); } }

/* ── SCROLL ── */
#scroll {
  position: fixed;
  top: var(--bar-h); left: 0; right: 0; bottom: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; min-width: 780px; }

thead th {
  position: sticky; top: 0; z-index: 10;
  background: rgba(242,242,247,.95);
  backdrop-filter: blur(8px);
  padding: 7px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--lbl);
  letter-spacing: .03em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--brd);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  /* All headers: right-align numbers, left-align text — set per column */
  text-align: right;
}
/* text columns left-aligned */
thead th.l { text-align: left; }
/* numeric already right */
thead th:hover { color: var(--txt2); }
thead th.sorted { color: var(--txt2); }
thead th.sorted::after { content: ' ↓'; font-size: 9px; opacity: .6; }
thead th.sorted.asc::after { content: ' ↑'; }

tbody tr {
  background: var(--sur);
  border-bottom: 1px solid var(--brd);
  transition: background .08s;
}
tbody tr:hover { background: #f5f5f7; }
tbody tr.unloaded { opacity: .45; }

/* ── CELLS ── */
td {
  padding: 6px 12px;
  vertical-align: middle;
  font-size: 13px;
  color: var(--txt);
  white-space: nowrap;
}

/* index */
.ci {
  color: var(--lbl); font-size: 11px;
  text-align: right; width: 28px;
  padding-right: 4px;
  font-variant-numeric: tabular-nums;
}
/* flame */
.cfl { width: 28px; text-align: center; padding: 0 4px; }
.bfl { font-size: 12px; opacity: .14; display: inline-block; }
.bfl.on { opacity: 1; }

/* ticker */
.ctk { font-weight: 600; font-size: 13px; letter-spacing: .01em; }

/* market badge */
.cmkt { width: 72px; }
.mbadge {
  display: inline-block; padding: 2px 7px;
  border-radius: 6px;
  font-size: 11px; font-weight: 500;
  background: var(--sur2);
  border: 1px solid var(--brd);
  color: var(--txt3);
  transition: background .3s, color .3s, border-color .3s;
}
.mbadge.open   { background: rgba(29,111,66,.09);  border-color: rgba(29,111,66,.22); color: #1d6f42; }
.mbadge.closed { background: rgba(192,57,43,.07);  border-color: rgba(192,57,43,.18); color: #c0392b; }

/* company name */
.cnm { color: var(--txt3); font-size: 12.5px; max-width: 170px; overflow: hidden; text-overflow: ellipsis; }

/* numeric cells */
.cpr  { text-align: right; }
.ctg  { text-align: right; }
.cup  { text-align: right; }
.cdchg { text-align: right; }
.c52  { text-align: right; width: 140px; }
.num  { font-family: var(--fnum); font-size: 12px; font-variant-numeric: tabular-nums; }
.cur  { font-size: 9px; color: var(--lbl); margin-left: 2px; }

/* tgt: non-editable, just plain */
.ctg span { font-family: var(--fnum); font-size: 12px; font-variant-numeric: tabular-nums; }

/* MoS pill */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  min-width: 58px;
  text-align: center;
}
.pill.nt { background: var(--sur2); color: var(--lbl); }

/* 52w range */

/* skeleton */
.sk {
  display: inline-block; border-radius: 4px;
  background: linear-gradient(90deg, var(--brd) 25%, var(--sur2) 50%, var(--brd) 75%);
  background-size: 200% 100%;
  animation: sh 1.3s infinite;
  vertical-align: middle;
}
@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.row-empty td {
  padding: 56px; text-align: center;
  color: var(--lbl); font-size: 14px;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: rgba(28,28,30,.88);
  color: #fff;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 600; pointer-events: none;
  backdrop-filter: blur(12px);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- SINGLE CONTROL BAR -->
<div id="bar">
  <!-- search left -->
  <div class="search-wrap">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="text" id="q" placeholder="Buscar…" oninput="render()">
  </div>

  <div class="bsep"></div>

  <!-- stat-filter buttons in order: total, cargadas, baratas, caras, dest, dest+baratas, mkt -->
  <button class="statbtn" id="f-all" onclick="setFilter('all')">
    <span class="stat-l">Total</span><span class="stat-v" id="s-tot">—</span>
  </button>
  <button class="statbtn" id="f-loaded" onclick="setFilter('loaded')">
    <span class="stat-l">Cargadas</span><span class="stat-v" id="s-ld">—</span>
  </button>
  <button class="statbtn active" id="f-up" onclick="setFilter('up')">
    <span class="stat-l">Baratas</span><span class="stat-v up" id="s-up">—</span>
  </button>
  <button class="statbtn" id="f-dn" onclick="setFilter('dn')">
    <span class="stat-l">Caras</span><span class="stat-v dn" id="s-dn">—</span>
  </button>
  <button class="statbtn" id="f-flag" onclick="setFilter('flag')">
    <span class="stat-l">🔥</span><span class="stat-v" id="s-flag">—</span>
  </button>
  <button class="statbtn" id="f-up-flag" onclick="setFilter('up-flag')">
    <span class="stat-l">🛒🔥</span><span class="stat-v" id="s-upflag">—</span>
  </button>

  <div class="bsep"></div>

  <!-- market open toggle (icon only, default ON) -->
  <button class="mktbtn on" id="mf-open" onclick="toggleMktFilter()" title="Filtrar mercados abiertos">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
  </button>

  <!-- reload right -->
  <!-- FX rates + VIX -->
  <div class="bsep"></div>
  <div id="fx-bar">
    <div class="fx-chip"><span class="fx-lbl">EUR/USD</span><span class="fx-val" id="fx-eurusd">—</span></div>
    <span class="fx-sep"></span>
    <div class="fx-chip"><span class="fx-lbl">EUR/GBP</span><span class="fx-val" id="fx-eurgbp">—</span></div>
    <span class="fx-sep"></span>
    <div class="fx-chip"><span class="fx-lbl">EUR/HKD</span><span class="fx-val" id="fx-eurhkd">—</span></div>
    <span class="fx-sep"></span>
    <div class="fx-chip"><span class="fx-lbl">EUR/AUD</span><span class="fx-val" id="fx-euraud">—</span></div>
    <span class="fx-sep"></span>
    <div class="fx-chip"><span class="fx-lbl">VIX</span><span class="fx-val" id="fx-vix">—</span></div>
  </div>

  <div class="bar-right">
    <span id="last-upd"></span>
    <button class="btn-reload" id="btn-reload" onclick="manualReload()" title="Actualizar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    </button>
  </div>
</div>
<!-- TABLE -->
<div id="scroll">
  <table>
    <thead>
      <tr>
        <th class="ci">#</th>
        <th class="cfl" onclick="sortBy('flag')">🔥</th>
        <th class="l" onclick="sortBy('tick')">Ticker</th>
        <th class="l" onclick="sortBy('mkt')">Mercado</th>
        <th class="l">Empresa</th>
        <th class="r" onclick="sortBy('price')">Precio</th>
        <th class="r" onclick="sortBy('target')">Objetivo</th>
        <th class="r sorted" id="th-up" onclick="sortBy('upside')">MoS</th>
        <th class="r" onclick="sortBy('daychg')">Día %</th>
        <th class="r" onclick="sortBy('range52')">52W Range</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=0&single=true&output=csv';
const FX_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=1216010991&single=true&output=csv';
const REFRESH_MS = 30000; // auto-refresh every 30 seconds


const MF={NASDAQ:'NASDAQ',NYSE:'NYSE',US:'NYSE',OTC:'OTC',BME:'BME',LON:'LON',
          HKG:'HKEX',AMS:'AMS',EPA:'EPA',ETR:'ETR',ASX:'ASX',BIT:'BIT',
          VIE:'VIE',FRA:'FRA',SWX:'SWX'};

let rows=[], sortKey='upside', sortDir=-1, filterMode='up';
let mktFilter='open'; // default: show only open markets

// ── PARSE ──
function parseNum(s){
  if(!s) return null;
  s=s.trim().replace(/^"|"$/g,'');
  if(!s||['#N/A','#REF!','#ERROR!','#VALUE!','#DIV/0!'].includes(s)) return null;
  const hD=s.includes('.'), hC=s.includes(',');
  let n = hD&&hC ? s.replace(/\./g,'').replace(',','.') : hC ? s.replace(',','.') : s;
  const v=parseFloat(n); return isNaN(v)?null:v;
}

function splitLine(line){
  const r=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(cur);cur='';}
    else cur+=line[i];
  }
  r.push(cur); return r;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);
    if(c.length<5) continue;
    // TICKER(0) MERCADO(1) RAW(2) NOMBRE(3) PRECIO(4) TARGET(5) DIVISA(6) FLAG(7) HIGH_52W(8) LOW_52W(9)
    const tick=c[0].trim(); if(!tick||tick==='TICKER') continue;
    const mkt=c[1].trim();
    const name=c[3].trim();
    const price=parseNum(c[4]);
    const tgtSh=parseNum(c[5]);
    const cur=c[6].trim();
    const flagSheet=(c[7]||'').trim().toLowerCase()==='x'; // "x" in sheet = flagged
    const high52=parseNum(c[8]);
    const low52=parseNum(c[9]);
    const dayChg=parseNum(c[10]);
    const target = tgtSh;
    const flagVal = flagSheet;
    out.push({tick,mkt,name,price,target,cur,flag:flagVal,high52,low52,dayChg});
  }
  return out;
}

const upside = r => (r.price==null||r.target==null) ? null : ((r.target-r.price)/r.price)*100;
const r52pct = r => (r.price==null||r.high52==null||r.low52==null||r.high52<=r.low52) ? null
                   : Math.max(0,Math.min(1,(r.price-r.low52)/(r.high52-r.low52)));

// ── LOAD ──
let _loading=false;
async function loadSheet(silent=false){
  if(_loading) return;
  _loading=true;
  const btn=document.getElementById('btn-reload');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    rows=parseCSV(await res.text());
    const now=new Date();
    document.getElementById('last-upd').textContent='last snapshot '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateStats(); render();
    if(!silent) toast('✓ '+rows.length+' posiciones');
  }catch(e){
    if(!silent) toast('Error: '+e.message);
  }
  btn.disabled=false;
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>`;
  _loading=false;
}
function manualReload(){ loadSheet(false); loadFX(); }

async function loadFX() {
  try {
    const res = await fetch(FX_URL + '&t=' + Date.now());
    if (!res.ok) return;
    const lines = (await res.text()).trim().split('\n');
    const data = {};
    lines.forEach(line => {
      const cols = line.split(',');
      if (cols.length >= 2) {
        const key = cols[0].trim().toUpperCase();
        const val = parseNum(cols[1]);
        if (key && val !== null) data[key] = val;
      }
    });

    const set = (id, key, decimals=4) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = data[key];
      el.textContent = v != null ? v.toFixed(decimals) : '—';
    };

    set('fx-eurusd', 'EURUSD', 4);
    set('fx-eurgbp', 'EURGBP', 4);
    set('fx-eurhkd', 'EURHKD', 4);
    set('fx-euraud', 'EURAUD', 4);

    // VIX with color coding: <15 low (green), 15-25 mid (orange), >25 high (red)
    const vixEl = document.getElementById('fx-vix');
    const vix = data['VIX'];
    if (vixEl && vix != null) {
      vixEl.textContent = vix.toFixed(2);
      vixEl.className = 'fx-val ' + (vix > 30 ? 'vix-high' : vix >= 20 ? 'vix-mid' : 'vix-low');
    }
  } catch(e) {
    console.warn('FX load error:', e);
  }
}

// Auto-refresh
setInterval(()=>{ loadSheet(true); loadFX(); }, REFRESH_MS);

// ── STATS ──
function updateStats(){
  const ld=rows.filter(r=>r.price!=null);
  const ok=ld.filter(r=>r.target!=null);
  const ups=ok.filter(r=>upside(r)>0).length;
  const dns=ok.filter(r=>upside(r)!=null&&upside(r)<=0).length;
  const avg=ok.length?ok.reduce((s,r)=>s+upside(r),0)/ok.length:null;
  const flagged = rows.filter(r=>r.flag).length;
  const upflag  = rows.filter(r=>r.flag&&r.price!=null&&upside(r)>0).length;
  document.getElementById('s-tot').textContent=rows.length||'—';
  document.getElementById('s-ld').textContent=ld.length+(rows.length?'/'+rows.length:'');
  document.getElementById('s-up').textContent=ups||'—';
  document.getElementById('s-dn').textContent=dns||'—';
  document.getElementById('s-flag').textContent=flagged||'—';
  document.getElementById('s-upflag').textContent=upflag||'—';
}

// ── SORT ──
const TH={tick:1,mkt:2,price:4,target:5,upside:6,daychg:7,range52:8,flag:9};
function sortBy(key){
  if(sortKey===key) sortDir*=-1;
  else{sortKey=key; sortDir=(key==='upside'||key==='flag')?-1:1;}
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted','asc'));
  const idx=TH[key], ths=document.querySelectorAll('thead th');
  if(idx!=null&&ths[idx]){ths[idx].classList.add('sorted');if(sortDir===1)ths[idx].classList.add('asc');}
  render();
}

// ── 52W RANGE SVG (compact, shows min/price/max in one cell) ──
function range52svg(r){
  const pct=r52pct(r);
  const W=120, H=22;
  if(pct===null) return '<span style="color:var(--lbl);font-size:11px">—</span>';

  const inLower = pct<=0.5;
  const dotC = inLower?'#1d6f42':'#c0392b';
  const fillC = inLower?'#d1eedc':'#fad7d3';

  const nx = v => Math.round(4+v*(W-8));
  const prX = nx(pct);
  const midX = nx(0.5);
  const H2 = H/2;
  const pLabel = Math.round(pct*100);

  // Format numbers compactly
  const fmtC = v => {
    if(v==null) return '';
    if(Math.abs(v)>=10000) return (v/1000).toFixed(0)+'k';
    if(Math.abs(v)>=1000)  return v.toLocaleString('es-ES',{maximumFractionDigits:0});
    return v.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:1});
  };

  const loLabel = fmtC(r.low52);
  const hiLabel = fmtC(r.high52);
  const prLabel = fmtC(r.price);

  return `<div style="display:flex;align-items:center;gap:4px" title="${pLabel}% del rango 52 semanas">
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px;text-align:right">${loLabel}</span>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;flex-shrink:0">
      <rect x="4" y="${H2-2}" width="${W-8}" height="4" rx="2" fill="#e5e5ea"/>
      <rect x="4" y="${H2-2}" width="${Math.max(0,prX-4)}" height="4" rx="2" fill="${fillC}"/>
      <line x1="${midX}" y1="${H2-5}" x2="${midX}" y2="${H2+5}" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="2,1.5"/>
      <line x1="4"    y1="${H2-4}" x2="4"    y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="${W-4}" y1="${H2-4}" x2="${W-4}" y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="${prX}" cy="${H2}" r="4.5" fill="${dotC}"/>
      <circle cx="${prX}" cy="${H2}" r="2"   fill="white"/>
    </svg>
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px">${hiLabel}</span>
  </div>`;
}

// ── MARKET HOURS ──
// Returns true if the given exchange is currently open.
// All times compared in UTC.
function isMarketOpen(mkt) {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const day = now.getUTCDay(); // 0=Sun,6=Sat
  if (day === 0 || day === 6) return false; // weekend closed for all

  // Helper: is UTC time between hh:mm and hh:mm?
  const between = (h1,m1,h2,m2) => {
    const t = now.getUTCHours()*60+now.getUTCMinutes();
    return t >= h1*60+m1 && t < h2*60+m2;
  };

  switch(mkt) {
    // NYSE / NASDAQ: 14:30–21:00 UTC (09:30–16:00 ET, UTC-5 winter)
    case 'NYSE': case 'NASDAQ': case 'US': case 'OTC':
      return between(14,30, 21,0);
    // BME (Madrid): 08:00–16:30 UTC
    case 'BME':
      return between(8,0, 16,30);
    // LON (London): 08:00–16:30 UTC
    case 'LON':
      return between(8,0, 16,30);
    // EPA (Paris) / ETR (Frankfurt) / AMS / BIT / VIE / FRA / SWX: 08:00–16:30 UTC
    case 'EPA': case 'ETR': case 'AMS': case 'BIT': case 'VIE': case 'FRA': case 'SWX':
      return between(8,0, 16,30);
    // HKG (Hong Kong): 01:30–08:00 UTC (09:30–16:00 HKT, UTC+8)
    case 'HKG': case 'HKEX':
      return between(1,30, 8,0);
    // ASX (Australia): 23:00–05:00 UTC (09:00–15:00 AEST, UTC+10)
    case 'ASX':
      return between(23,0, 24,0) || between(0,0, 5,0);
    default:
      return false;
  }
}

// ── GRADIENT PILL ──
// Maps upside % to a red→orange→yellow→green color scale
function pillStyle(u) {
  if (u == null) return {bg:'var(--sur2)', color:'var(--lbl)'};

  let cr, cg, cb;

  if (u >= 0) {
    // BARATAS: amarillo claro (u~0) → verde intenso (u>=40)
    // u=0  → rgb(180,210,100) amarillo-verde claro
    // u=40 → rgb(29,111,66)   verde intenso
    const t = Math.min(1, u / 40); // 0..1
    cr = Math.round(180 + (29  - 180) * t);
    cg = Math.round(210 + (111 - 210) * t);
    cb = Math.round(100 + (66  - 100) * t);
  } else {
    // CARAS: amarillo (u~0) → naranja → rojo intenso (u<=-40)
    // u=0   → rgb(241,196,15)  amarillo
    // u=-20 → rgb(230,126,34)  naranja
    // u=-40 → rgb(192,57,43)   rojo
    const t = Math.min(1, Math.abs(u) / 40); // 0..1
    if (t < 0.5) {
      const s = t / 0.5;
      cr = Math.round(241 + (230 - 241) * s);
      cg = Math.round(196 + (126 - 196) * s);
      cb = Math.round(15  + (34  - 15)  * s);
    } else {
      const s = (t - 0.5) / 0.5;
      cr = Math.round(230 + (192 - 230) * s);
      cg = Math.round(126 + (57  - 126) * s);
      cb = Math.round(34  + (43  - 34)  * s);
    }
  }

  const bg    = `rgba(${cr},${cg},${cb},0.18)`;
  const color = `rgb(${Math.round(cr*0.55)},${Math.round(cg*0.55)},${Math.round(cb*0.55)})`;
  return {bg, color};
}

// ── DAY CHANGE ──
function dayChgStr(r) {
  if (r.dayChg == null) return '<span style="color:var(--lbl)">—</span>';
  const v   = r.dayChg;
  const str = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  const col = v > 0 ? 'var(--up)' : v < 0 ? 'var(--dn)' : 'var(--lbl)';
  return `<span class="num" style="color:${col}">${str}</span>`;
}

// ── RENDER ──
const fmt=(v,d=2)=>v==null?'—':v.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  let list=rows.filter(r=>{
    if(q&&!r.tick.toLowerCase().includes(q)&&!(r.name||'').toLowerCase().includes(q)&&!r.mkt.toLowerCase().includes(q)) return false;
    if(filterMode==='loaded'  && r.price==null) return false;
    if(filterMode==='up'      && !(r.price!=null&&upside(r)>0)) return false;
    if(filterMode==='dn'      && !(r.price!=null&&upside(r)!=null&&upside(r)<=0)) return false;
    if(filterMode==='flag'    && !r.flag) return false;
    if(filterMode==='up-flag' && !(r.flag&&r.price!=null&&upside(r)>0)) return false;
    if(mktFilter==='open'   && !isMarketOpen(r.mkt)) return false;
    if(mktFilter==='closed' &&  isMarketOpen(r.mkt)) return false;
    return true;
  });

  list.sort((a,b)=>{
    if(sortKey==='tick') return sortDir*(a.tick<b.tick?-1:a.tick>b.tick?1:0);
    if(sortKey==='mkt')  return sortDir*(a.mkt<b.mkt?-1:a.mkt>b.mkt?1:0);
    if(sortKey==='flag') return sortDir*((b.flag?1:0)-(a.flag?1:0));
    if(sortKey==='upside'){const ua=upside(a),ub=upside(b);if(ua==null&&ub==null)return 0;if(ua==null)return 1;if(ub==null)return -1;return sortDir*(ua-ub);}
    if(sortKey==='range52'){const pa=r52pct(a)??-1,pb=r52pct(b)??-1;return sortDir*(pa-pb);}
    if(sortKey==='daychg'){const da=a.dayChg??-Infinity,db=b.dayChg??-Infinity;return sortDir*(da-db);}
    const k={price:'price',target:'target'}[sortKey];
    const va=a[k]??-Infinity,vb=b[k]??-Infinity;
    return sortDir*(va-vb);
  });

  const tbody=document.getElementById('tbody');
  if(!list.length){tbody.innerHTML='<tr class="row-empty"><td colspan="9">Sin resultados</td></tr>';return;}

  tbody.innerHTML=list.map((r,i)=>{
    const u=upside(r);
    const uSt=u==null?'—':(u>=0?'+':'')+u.toFixed(1)+'%';
    const {bg:pBg, color:pColor} = pillStyle(u);
    const pillInline = u==null ? 'class="pill nt"' : `class="pill" style="background:${pBg};color:${pColor}"`;
    const rid='r_'+r.tick.replace(/[^a-zA-Z0-9]/g,'_');
    const st=r.tick.replace(/'/g,"\\'");

    const prStr=r.price==null
      ?'<span class="sk" style="width:46px;height:12px"></span>'
      :`<span class="num">${fmt(r.price)}</span>${r.cur?`<span class="cur">${r.cur}</span>`:''}`;

    const tgtStr=r.target!=null
      ?`<span class="num">${fmt(r.target)}</span>${r.cur?`<span class="cur">${r.cur}</span>`:''}`
      :'<span style="color:var(--lbl)">—</span>';

    const nmStr=r.name||(r.price==null?'<span class="sk" style="width:100px;height:12px"></span>':'—');
    const trCls=[r.flag?'flagged':'',r.price==null?'unloaded':''].filter(Boolean).join(' ');

    return `<tr id="${rid}" class="${trCls}">
      <td class="ci">${i+1}</td>
      <td class="cfl"><span class="bfl ${r.flag?'on':''}">🔥</span></td>
      <td class="ctk">${r.tick}</td>
      <td class="cmkt"><span class="mbadge ${isMarketOpen(r.mkt)?'open':'closed'}">${MF[r.mkt]||r.mkt}</span></td>
      <td class="cnm" title="${r.name||''}">${nmStr}</td>
      <td class="cpr">${prStr}</td>
      <td class="ctg">${tgtStr}</td>
      <td class="cup"><span ${pillInline}>${uSt}</span></td>
      <td class="cdchg">${dayChgStr(r)}</td>
      <td class="c52">${range52svg(r)}</td>
    </tr>`;
  }).join('');
}
