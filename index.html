<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #f2f2f7;
  --sur:     #ffffff;
  --sur2:    #f2f2f7;
  --brd:     #e5e5ea;
  --brd2:    #d1d1d6;
  --lbl:     #8e8e93;
  --txt:     #1c1c1e;
  --txt2:    #3a3a3c;
  --txt3:    #636366;
  --up:      #1d6f42;
  --up-pill: #d1eedc;
  --dn:      #c0392b;
  --dn-pill: #fad7d3;
  --flag-bg: #fff5ee;
  --blue:    #007aff;
  --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --fnum:    'SF Mono', 'Menlo', 'Consolas', monospace;
  --bar-h:   44px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── SINGLE CONTROL BAR ── */
#bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: var(--bar-h);
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--brd);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  overflow-x: auto;
  white-space: nowrap;
}
#bar::-webkit-scrollbar { display: none; }

.bsep { width: 1px; height: 20px; background: var(--brd2); flex-shrink: 0; }

/* stat chips */
.stat-l { font-size: 10px; color: var(--lbl); font-weight: 500; line-height: 1.2; }
.stat-v { font-size: 13px; font-weight: 700; color: var(--txt); font-variant-numeric: tabular-nums; line-height: 1.3; }
.stat-v.up { color: var(--up); }
.stat-v.dn { color: var(--dn); }

/* stat-filter button: label on top, value below */
.statbtn {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 0; flex-shrink: 0;
  background: none; border: none; border-radius: 8px;
  padding: 3px 8px; cursor: pointer;
  transition: background .12s;
}
.statbtn:hover { background: var(--sur2); }
.statbtn.active { background: var(--blue); }
.statbtn.active .stat-l { color: rgba(255,255,255,.75); }
.statbtn.active .stat-v { color: #fff; }
.statbtn.active .stat-v.up { color: #fff; }
.statbtn.active .stat-v.dn { color: #fff; }

/* search */
.search-wrap { position: relative; flex-shrink: 0; }
.search-wrap svg { position: absolute; left: 7px; top: 50%; transform: translateY(-50%); color: var(--lbl); pointer-events: none; }
.search-input {
  width: 110px;
  background: var(--sur2);
  border: 1px solid transparent;
  border-radius: 7px;
  color: var(--txt);
  font-family: var(--font);
  font-size: 12px;
  padding: 4px 8px 4px 24px;
  outline: none;
  transition: width .2s, border-color .15s, background .15s;
}
.search-input:focus { width: 160px; background: var(--sur); border-color: var(--blue); }
.search-input::placeholder { color: var(--lbl); }




/* reload + timestamp */
.bar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#last-upd { font-size: 10px; color: var(--lbl); font-variant-numeric: tabular-nums; }
.btn-reload {
  background: none; border: none; cursor: pointer;
  color: var(--blue); display: flex; align-items: center;
  padding: 3px; border-radius: 6px; transition: background .12s;
}
.btn-reload:hover { background: var(--sur2); }
.btn-reload:disabled { opacity: .4; cursor: not-allowed; }
.spin { width: 13px; height: 13px; border: 1.8px solid var(--brd2); border-top-color: var(--blue); border-radius: 50%; animation: ro .65s linear infinite; }
@keyframes ro { to { transform: rotate(360deg); } }

/* ── SCROLL ── */
#scroll {
  position: fixed;
  top: var(--bar-h); left: 0; right: 0; bottom: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; min-width: 780px; }

thead th {
  position: sticky; top: 0; z-index: 10;
  background: var(--sur);
  padding: 6px 11px;
  text-align: left;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--lbl);
  letter-spacing: .02em;
  border-bottom: 1px solid var(--brd);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th.r { text-align: right; }
thead th:hover { color: var(--txt2); }
thead th.sorted { color: var(--blue); }
thead th.sorted::after { content: ' ↓'; font-size: 9px; }
thead th.sorted.asc::after { content: ' ↑'; }

tbody tr {
  background: var(--sur);
  border-bottom: 1px solid var(--brd);
  transition: background .08s;
}
tbody tr:hover { background: #f6f6f9; }
tbody tr.flagged { background: var(--sur); }
tbody tr.flagged:hover { background: #f6f6f9; }
tbody tr.unloaded { opacity: .5; }

/* compact rows */
td {
  padding: 5px 11px;
  vertical-align: middle;
  font-size: 12.5px;
  color: var(--txt);
  white-space: nowrap;
}

/* cells */
.ci   { font-size: 11px; color: var(--lbl); text-align: right; width: 28px; padding-right: 4px; font-variant-numeric: tabular-nums; }
.ctk  { font-weight: 600; font-size: 12.5px; }
.cmkt { width: 64px; }
.mbadge {
  display: inline-block; padding: 1px 6px;
  background: var(--sur2); border: 1px solid var(--brd);
  border-radius: 5px; font-size: 10.5px; font-weight: 500; color: var(--txt3);
}
.cnm  { color: var(--txt3); max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.cpr, .ctg, .cup, .c52 { text-align: right; }
.num  { font-family: var(--fnum); font-size: 12px; font-variant-numeric: tabular-nums; }
.cur  { font-size: 9.5px; color: var(--lbl); margin-left: 1px; }



/* upside pill */
.pill {
  display: inline-block; padding: 1px 7px; border-radius: 5px;
  font-size: 11.5px; font-weight: 600; font-variant-numeric: tabular-nums;
  min-width: 56px; text-align: center;
}
.pill.up { background: var(--up-pill); color: var(--up); }
.pill.dn { background: var(--dn-pill); color: var(--dn); }
.pill.nt { background: var(--sur2); color: var(--lbl); }

/* 52w range column */
.c52 { width: 130px; text-align: left; }

/* flag button */
.cfl { width: 34px; text-align: center; }
.bfl {
  font-size: 13px; line-height: 1; display: inline-block;
  opacity: .15;
}
.bfl.on { opacity: 1; }

/* skeleton */
.sk {
  display: inline-block; border-radius: 3px;
  background: linear-gradient(90deg,var(--brd) 25%,var(--sur2) 50%,var(--brd) 75%);
  background-size: 200% 100%; animation: sh 1.2s infinite; vertical-align: middle;
}
@keyframes sh { 0%{background-position:200% 0}100%{background-position:-200% 0} }

.row-empty td { padding: 48px; text-align: center; color: var(--lbl); font-size: 13px; }

/* toast */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: rgba(28,28,30,.9); color: #fff;
  padding: 7px 18px; border-radius: 18px;
  font-size: 12px; font-weight: 500;
  z-index: 600; pointer-events: none;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
}
#toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- SINGLE CONTROL BAR -->
<div id="bar">
  <!-- search left -->
  <div class="search-wrap">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="text" id="q" placeholder="Buscar…" oninput="render()">
  </div>

  <div class="bsep"></div>

  <!-- stat-filter buttons -->
  <button class="statbtn" id="f-all"    onclick="setFilter('all')">
    <span class="stat-l">Total</span><span class="stat-v" id="s-tot">—</span>
  </button>
  <button class="statbtn active" id="f-loaded" onclick="setFilter('loaded')">
    <span class="stat-l">Cargadas</span><span class="stat-v" id="s-ld">—</span>
  </button>
  <button class="statbtn" id="f-up"     onclick="setFilter('up')">
    <span class="stat-l">Baratas</span><span class="stat-v up" id="s-up">—</span>
  </button>
  <button class="statbtn" id="f-dn"     onclick="setFilter('dn')">
    <span class="stat-l">Caras</span><span class="stat-v dn" id="s-dn">—</span>
  </button>
  <button class="statbtn" id="f-avg"    onclick="setFilter('loaded')" style="cursor:default">
    <span class="stat-l">Upside medio</span><span class="stat-v" id="s-avg">—</span>
  </button>
  <button class="statbtn" id="f-flag"   onclick="setFilter('flag')">
    <span class="stat-l">🔥</span><span class="stat-v" id="s-flag">—</span>
  </button>
  <button class="statbtn" id="f-up-flag" onclick="setFilter('up-flag')">
    <span class="stat-l">🛒🔥</span><span class="stat-v" id="s-upflag">—</span>
  </button>

  <!-- reload right -->
  <div class="bar-right">
    <span id="last-upd"></span>
    <button class="btn-reload" id="btn-reload" onclick="manualReload()" title="Actualizar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    </button>
  </div>
</div>
<!-- TABLE -->
<div id="scroll">
  <table>
    <thead>
      <tr>
        <th class="ci">#</th>
        <th class="cfl" onclick="sortBy('flag')">🔥</th>
        <th onclick="sortBy('tick')">Ticker</th>
        <th onclick="sortBy('mkt')">Mercado</th>
        <th>Empresa</th>
        <th class="r" onclick="sortBy('price')">Precio</th>
        <th class="r" onclick="sortBy('target')">Objetivo</th>
        <th class="r sorted" id="th-up" onclick="sortBy('upside')">Upside %</th>
        <th onclick="sortBy('range52')">52W Range</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=0&single=true&output=csv';
const REFRESH_MS = 60000; // auto-refresh every 60 seconds


const MF={NASDAQ:'NASDAQ',NYSE:'NYSE',US:'NYSE',OTC:'OTC',BME:'BME',LON:'LON',
          HKG:'HKEX',AMS:'AMS',EPA:'EPA',ETR:'ETR',ASX:'ASX',BIT:'BIT',
          VIE:'VIE',FRA:'FRA',SWX:'SWX'};

let rows=[], sortKey='upside', sortDir=-1, filterMode='loaded';

// ── PARSE ──
function parseNum(s){
  if(!s) return null;
  s=s.trim().replace(/^"|"$/g,'');
  if(!s||['#N/A','#REF!','#ERROR!','#VALUE!','#DIV/0!'].includes(s)) return null;
  const hD=s.includes('.'), hC=s.includes(',');
  let n = hD&&hC ? s.replace(/\./g,'').replace(',','.') : hC ? s.replace(',','.') : s;
  const v=parseFloat(n); return isNaN(v)?null:v;
}

function splitLine(line){
  const r=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(cur);cur='';}
    else cur+=line[i];
  }
  r.push(cur); return r;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const T=store.targets, F=store.flags, out=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);
    if(c.length<5) continue;
    // TICKER(0) MERCADO(1) RAW(2) NOMBRE(3) PRECIO(4) TARGET(5) DIVISA(6) FLAG(7) HIGH_52W(8) LOW_52W(9)
    const tick=c[0].trim(); if(!tick||tick==='TICKER') continue;
    const mkt=c[1].trim();
    const name=c[3].trim();
    const price=parseNum(c[4]);
    const tgtSh=parseNum(c[5]);
    const cur=c[6].trim();
    const flagSheet=(c[7]||'').trim().toLowerCase()==='x'; // "x" in sheet = flagged
    const high52=parseNum(c[8]);
    const low52=parseNum(c[9]);
    const target = tgtSh;
    const flagVal = flagSheet;
    out.push({tick,mkt,name,price,target,cur,flag:flagVal,high52,low52});
  }
  return out;
}

const upside = r => (r.price==null||r.target==null) ? null : ((r.target-r.price)/r.price)*100;
const r52pct = r => (r.price==null||r.high52==null||r.low52==null||r.high52<=r.low52) ? null
                   : Math.max(0,Math.min(1,(r.price-r.low52)/(r.high52-r.low52)));

// ── LOAD ──
let _loading=false;
async function loadSheet(silent=false){
  if(_loading) return;
  _loading=true;
  const btn=document.getElementById('btn-reload');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    rows=parseCSV(await res.text());
    const now=new Date();
    document.getElementById('last-upd').textContent=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    updateStats(); render();
    if(!silent) toast('✓ '+rows.length+' posiciones');
  }catch(e){
    if(!silent) toast('Error: '+e.message);
  }
  btn.disabled=false;
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>`;
  _loading=false;
}
function manualReload(){ loadSheet(false); }

// Auto-refresh
setInterval(()=>loadSheet(true), REFRESH_MS);

// ── STATS ──
function updateStats(){
  const ld=rows.filter(r=>r.price!=null);
  const ok=ld.filter(r=>r.target!=null);
  const ups=ok.filter(r=>upside(r)>0).length;
  const dns=ok.filter(r=>upside(r)!=null&&upside(r)<=0).length;
  const avg=ok.length?ok.reduce((s,r)=>s+upside(r),0)/ok.length:null;
  const flagged = rows.filter(r=>r.flag).length;
  const upflag  = rows.filter(r=>r.flag&&r.price!=null&&upside(r)>0).length;
  document.getElementById('s-tot').textContent=rows.length||'—';
  document.getElementById('s-ld').textContent=ld.length+(rows.length?'/'+rows.length:'');
  document.getElementById('s-up').textContent=ups||'—';
  document.getElementById('s-dn').textContent=dns||'—';
  document.getElementById('s-flag').textContent=flagged||'—';
  document.getElementById('s-upflag').textContent=upflag||'—';
  const el=document.getElementById('s-avg');
  el.textContent=avg!=null?(avg>=0?'+':'')+avg.toFixed(1)+'%':'—';
  el.className='stat-v'+(avg==null?'':avg>0?' up':' dn');
}

// ── SORT ──
const TH={tick:1,mkt:2,price:4,target:5,upside:6,range52:7,flag:8};
function sortBy(key){
  if(sortKey===key) sortDir*=-1;
  else{sortKey=key; sortDir=(key==='upside'||key==='flag')?-1:1;}
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted','asc'));
  const idx=TH[key], ths=document.querySelectorAll('thead th');
  if(idx!=null&&ths[idx]){ths[idx].classList.add('sorted');if(sortDir===1)ths[idx].classList.add('asc');}
  render();
}

// ── FILTER ──
function setFilter(mode){
  filterMode=mode;
  ['all','loaded','up','dn','flag','up-flag','avg'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.classList.toggle('active',f===mode);
  });
  // loaded is default active visual when mode is 'loaded'
  render();
}

// ── 52W RANGE SVG (compact, shows min/price/max in one cell) ──
function range52svg(r){
  const pct=r52pct(r);
  const W=120, H=22;
  if(pct===null) return '<span style="color:var(--lbl);font-size:11px">—</span>';

  const inLower = pct<=0.5;
  const dotC = inLower?'#1d6f42':'#c0392b';
  const fillC = inLower?'#d1eedc':'#fad7d3';

  const nx = v => Math.round(4+v*(W-8));
  const prX = nx(pct);
  const midX = nx(0.5);
  const H2 = H/2;
  const pLabel = Math.round(pct*100);

  // Format numbers compactly
  const fmtC = v => {
    if(v==null) return '';
    if(Math.abs(v)>=10000) return (v/1000).toFixed(0)+'k';
    if(Math.abs(v)>=1000)  return v.toLocaleString('es-ES',{maximumFractionDigits:0});
    return v.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:1});
  };

  const loLabel = fmtC(r.low52);
  const hiLabel = fmtC(r.high52);
  const prLabel = fmtC(r.price);

  return `<div style="display:flex;align-items:center;gap:4px" title="${pLabel}% del rango 52 semanas">
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px;text-align:right">${loLabel}</span>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;flex-shrink:0">
      <rect x="4" y="${H2-2}" width="${W-8}" height="4" rx="2" fill="#e5e5ea"/>
      <rect x="4" y="${H2-2}" width="${Math.max(0,prX-4)}" height="4" rx="2" fill="${fillC}"/>
      <line x1="${midX}" y1="${H2-5}" x2="${midX}" y2="${H2+5}" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="2,1.5"/>
      <line x1="4"    y1="${H2-4}" x2="4"    y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="${W-4}" y1="${H2-4}" x2="${W-4}" y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="${prX}" cy="${H2}" r="4.5" fill="${dotC}"/>
      <circle cx="${prX}" cy="${H2}" r="2"   fill="white"/>
    </svg>
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px">${hiLabel}</span>
  </div>`;
}

// ── RENDER ──
const fmt=(v,d=2)=>v==null?'—':v.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  let list=rows.filter(r=>{
    if(q&&!r.tick.toLowerCase().includes(q)&&!(r.name||'').toLowerCase().includes(q)&&!r.mkt.toLowerCase().includes(q)) return false;
    if(filterMode==='loaded'  && r.price==null) return false;
    if(filterMode==='up'      && !(r.price!=null&&upside(r)>0)) return false;
    if(filterMode==='dn'      && !(r.price!=null&&upside(r)!=null&&upside(r)<=0)) return false;
    if(filterMode==='flag'    && !r.flag) return false;
    if(filterMode==='up-flag' && !(r.flag&&r.price!=null&&upside(r)>0)) return false;
    return true;
  });

  list.sort((a,b)=>{
    if(sortKey==='tick') return sortDir*(a.tick<b.tick?-1:a.tick>b.tick?1:0);
    if(sortKey==='mkt')  return sortDir*(a.mkt<b.mkt?-1:a.mkt>b.mkt?1:0);
    if(sortKey==='flag') return sortDir*((b.flag?1:0)-(a.flag?1:0));
    if(sortKey==='upside'){const ua=upside(a),ub=upside(b);if(ua==null&&ub==null)return 0;if(ua==null)return 1;if(ub==null)return -1;return sortDir*(ua-ub);}
    if(sortKey==='range52'){const pa=r52pct(a)??-1,pb=r52pct(b)??-1;return sortDir*(pa-pb);}
    const k={price:'price',target:'target'}[sortKey];
    const va=a[k]??-Infinity,vb=b[k]??-Infinity;
    return sortDir*(va-vb);
  });

  const tbody=document.getElementById('tbody');
  if(!list.length){tbody.innerHTML='<tr class="row-empty"><td colspan="9">Sin resultados</td></tr>';return;}

  tbody.innerHTML=list.map((r,i)=>{
    const u=upside(r);
    const uCl=u==null?'nt':u>0?'up':'dn';
    const uSt=u==null?'—':(u>=0?'+':'')+u.toFixed(1)+'%';
    const rid='r_'+r.tick.replace(/[^a-zA-Z0-9]/g,'_');
    const st=r.tick.replace(/'/g,"\\'");

    const prStr=r.price==null
      ?'<span class="sk" style="width:46px;height:12px"></span>'
      :`<span class="num">${fmt(r.price)}</span>${r.cur?`<span class="cur">${r.cur}</span>`:''}`;

    const tgtStr=r.target!=null
      ?`<span class="num">${fmt(r.target)}</span>${r.cur?`<span class="cur">${r.cur}</span>`:''}`
      :'<span style="color:var(--lbl)">—</span>';

    const nmStr=r.name||(r.price==null?'<span class="sk" style="width:100px;height:12px"></span>':'—');
    const trCls=[r.flag?'flagged':'',r.price==null?'unloaded':''].filter(Boolean).join(' ');

    return `<tr id="${rid}" class="${trCls}">
      <td class="ci">${i+1}</td>
      <td class="cfl"><span class="bfl ${r.flag?'on':''}">🔥</span></td>
      <td class="ctk">${r.tick}</td>
      <td class="cmkt"><span class="mbadge">${MF[r.mkt]||r.mkt}</span></td>
      <td class="cnm" title="${r.name||''}">${nmStr}</td>
      <td class="cpr">${prStr}</td>
      <td class="ctg">${tgtStr}</td>
      <td class="cup"><span class="pill ${uCl}">${uSt}</span></td>
      <td class="c52">${range52svg(r)}</td>
    </tr>`;
  }).join('');
}



// ── TOAST ──
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}

// ── INIT ──
updateStats(); render(); loadSheet();
</script>
